kind = "web"
previewPath = "/"
title = "IDALIA"
version = "1.0.0"
id = "artifacts/idalia"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25496

[services.development]
run = "pnpm --filter @workspace/idalia run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/idalia", "run", "build" ]
publicDir = "artifacts/idalia/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25496"
BASE_PATH = "/"
