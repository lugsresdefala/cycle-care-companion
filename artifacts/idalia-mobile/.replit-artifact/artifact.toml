kind = "mobile"
previewPath = "/mobile/"
title = "IDALIA Mobile"
version = "1.0.0"
id = "artifacts/idalia-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 25760

[services.development]
run = "pnpm --filter @workspace/idalia-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/idalia-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/idalia-mobile", "run", "serve" ]

[services.env]
PORT = "25760"
BASE_PATH = "/mobile/"
